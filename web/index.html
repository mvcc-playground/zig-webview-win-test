<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Zig Mini Tauri</title>
        <style>
            :root {
                color-scheme: light;
                --bg: #f7f8fc;
                --card: #ffffff;
                --text: #17202a;
                --muted: #5d6d7e;
                --accent: #0d9488;
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                min-height: 100vh;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background: radial-gradient(
                    circle at top left,
                    #d9f6f1 0%,
                    var(--bg) 60%
                );
                color: var(--text);
                display: grid;
                place-items: center;
            }
            main {
                width: min(760px, 92vw);
                background: var(--card);
                border-radius: 16px;
                padding: 24px;
                box-shadow: 0 18px 45px rgba(18, 38, 63, 0.12);
            }
            h1 {
                margin: 0 0 8px;
                font-size: 1.8rem;
            }
            p {
                margin: 0 0 16px;
                color: var(--muted);
            }
            .row {
                display: flex;
                gap: 10px;
                align-items: center;
            }
            input {
                flex: 1;
                padding: 10px 12px;
                border: 1px solid #d0d7e2;
                border-radius: 10px;
            }
            button {
                border: 0;
                border-radius: 10px;
                padding: 10px 14px;
                background: var(--accent);
                color: #fff;
                cursor: pointer;
            }
            pre {
                margin-top: 16px;
                padding: 14px;
                border-radius: 10px;
                background: #0b1020;
                color: #d6e1ff;
                min-height: 120px;
                overflow: auto;
            }
        </style>
    </head>
    <body>
        <main>
            <h1>Mini Tauri (Zig)</h1>
            <p>Teste de invoke JS -> Zig usando comando tipado.</p>
            <div class="row">
                <input id="msg" value="hello from index.html" />
                <button id="btn">Invocar ping</button>
            </div>
            <pre id="out">Aguardando chamada...</pre>
        </main>
        <script>
            const out = document.getElementById("out");
            const btn = document.getElementById("btn");
            const msg = document.getElementById("msg");

            async function invokeMini(command, ...args) {
                if (
                    typeof window.invoke !== "function"
                ) {
                    throw new Error(
                        "Bridge nativa indisponível (window.invoke)",
                    );
                }
                return window.invoke(command, ...args);
            }

            btn.addEventListener("click", async () => {
                try {
                    const [data, error] = await invokeMini("ping", {
                        message: msg.value,
                    });
                    out.textContent = JSON.stringify(
                        error ? { error } : { data },
                        null,
                        2,
                    );
                } catch (err) {
                    out.textContent = `Erro: ${String(err)}`;
                }
            });
        </script>
    </body>
</html>
