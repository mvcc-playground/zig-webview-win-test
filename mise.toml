[tools]
zig = "0.15.2"

[tasks.dev]
description = "Build and run the Zig app"
run = "zig build run"

[tasks.new-bin]
description = "Create src/bin/get-<name>.zig that prints mouse position"
run = "powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/new-get-bin.ps1"

[tasks.gen-types]
description = "Generate TypeScript d.ts files for invoke API"
run = "zig build gen-types"

[tasks.bin]
description = "Run src/bin/<name>.zig as `mise run bin -- <name>`"
run = "powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/run-bin.ps1"
