[tools]
zig = "0.15.2"

[tasks.dev]
description = "Start Vite dev server and run the Zig app"
run = "node ./scripts/dev.mjs"

[tasks.build]
description = "Generate types, build the static frontend, and build the Zig app"
run = "node ./scripts/build.mjs"

[tasks.build-frontend]
description = "Build the Vite frontend into dist"
run = "node ./scripts/build-frontend.mjs"

[tasks.new-bin]
description = "Create src-zig/bin/get-<name>.zig that prints mouse position"
run = "powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/new-get-bin.ps1"

[tasks.gen-types]
description = "Generate TypeScript d.ts files for invoke API"
run = "zig build gen-types"

[tasks."command:new"]
description = "Create src-zig/commands/<name>.zig and auto-register in the command registry"
run = "powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/new-command.ps1"

[tasks.bin]
description = "Run src-zig/bin/<name>.zig as `mise run bin -- <name>`"
run = "powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/run-bin.ps1"
